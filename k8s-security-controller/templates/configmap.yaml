apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "k8s-security-controller.fullname" . }}-config
  labels:
    {{- include "k8s-security-controller.labels" . | nindent 4 }}
data:
  security-profiles.yaml: |
    apiVersion: security.k8s-controller/v1
    kind: SecurityConfiguration
    metadata:
      name: default-security-profile
    spec:
      monitoring:
        enabled: {{ .Values.monitoring.enabled }}
        logLevel: {{ .Values.monitoring.logLevel }}
      
      autoResponse:
        enabled: {{ .Values.autoResponse.enabled }}
        actions:
          terminateProcess: {{ .Values.autoResponse.actions.terminateProcess }}
          isolateNetwork: {{ .Values.autoResponse.actions.isolateNetwork }}
          killContainer: {{ .Values.autoResponse.actions.killContainer }}
      
      protections:
        rce:
          enabled: {{ .Values.controller.securityProfiles.rceProtection }}
          suspiciousCommands: ["sh", "bash", "python", "perl", "wget", "curl"]
        
        mining:
          enabled: {{ .Values.controller.securityProfiles.miningProtection }}
          cpuThreshold: "80%"
          suspiciousProcesses: ["xmrig", "cpuminer"]
        
        privilegeEscalation:
          enabled: {{ .Values.controller.securityProfiles.privilegeEscalation }}
          blockedSyscalls: ["mount", "umount2", "setuid", "setgid"]
        
        cron:
          enabled: {{ .Values.controller.securityProfiles.cronProtection }}
          monitoredPaths: ["/etc/crontab", "/etc/cron.d/", "/var/spool/cron/crontabs/"]
        
        secrets:
          enabled: {{ .Values.controller.securityProfiles.secretsProtection }}
          protectedPaths: ["/var/run/secrets/kubernetes.io/serviceaccount/", "/app/secrets.txt"]

  security-config-cron.yaml: |
    cron:
      enabled: {{ .Values.cron.enabled }}
      monitoringInterval: {{ .Values.cron.monitoringInterval }}
      monitoredPaths:
{{- range .Values.cron.monitoredPaths }}
        - "{{ . }}"
{{- end }}
      suspiciousPatterns:
{{- range .Values.cron.suspiciousPatterns }}
        - "{{ . }}"
{{- end }}
      allowedCommands:
{{- range .Values.cron.allowedCommands }}
        - "{{ . }}"
{{- end }}
    logging:
      level: "info"
