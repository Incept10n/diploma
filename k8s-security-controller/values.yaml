# Default values for k8s-security-controller

controller:
  image:
    repository: incept1on999/k8s-security-controller
    tag: latest
    pullPolicy: Always
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  securityProfiles:
    rceProtection: true
    miningProtection: true
    privilegeEscalation: true
    cronProtection: true
    secretsProtection: true

# Falco integration
falco:
  enabled: false
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi
  securityContext:
    privileged: true
  podSecurityContext:
    privileged: true
  customRules: {}

# Sysdig integration
sysdig:
  enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 200m
      memory: 512Mi
  secure:
    enabled: false
  sysdig:
    accessKey: ""
  securityContext:
    privileged: true
  nodeAnalyzer:
    deploy: false
  admissionController:
    enabled: false
  clusterShield:
    enabled: false
  daemonset:
    enabled: true
  ebpf:
    enabled: true
  k8s:
    enabled: true
  logLevel: info
  serviceAccount:
    create: true

# Kube-bench integration
kube-bench:
  enabled: false
  cronjob:
    schedule: "* * * * *"
  provider: generic
  target: master
  benchmarkVersion: "cis-1.6"
  jsonLogging: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

monitoring:
  enabled: true
  logLevel: info

autoResponse:
  enabled: true
  actions:
    terminateProcess: true
    isolateNetwork: true
    killContainer: false

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

nodeSelector: {}

tolerations: []

affinity: {}

cron:
  enabled: false
  monitoringInterval: 10s
  monitoredPaths:
    - "/etc/crontab"
    - "/etc/cron.d/*"
    - "/var/spool/cron/crontabs/*"
  suspiciousPatterns:
    - "* * * * *"
    - "*/1 *"
    - "sh -c"
    - "bash -c"
    - "wget"
    - "curl"
    - "nc "
    - "ncat"
    - "/tmp/"
    - "/dev/shm/"
  allowedCommands:
    - "/usr/bin/apt"
    - "/usr/bin/yum"
    - "/usr/bin/systemctl"
    - "/usr/bin/logrotate"

fileMonitoring:
  enabled: true
  monitoringInterval: 10s
  forbiddenExtensions:
    # - ".pl"
    - ".sh"
    # - ".php"
    # - ".jsp"
    # - ".asp"
    # - ".exe"
    # - ".dll"
    # - ".so"
    # - ".tmp"
    # - ".bak"
  protectedPaths:
    - "/app"
    # - "/var/www"
    # - "/home"
    # - "/opt"
  allowedWritePaths:
    - "/app/uploads/"
    - "/var/www/html/uploads/"
    - "/tmp/"
    - "/app/cache/"
  maxFileSize: 10485760  # 10MB

secrets:
  enabled: true
  protectedPaths:
    - "/var/run/secrets/kubernetes.io/serviceaccount/"
    - "/etc/secret-volume/"
    - "/app/secrets.txt"
    - "/config/"
  suspiciousAccessPatterns:
    - "cat"
    - "grep"
    - "less"
    - "more"
    - "head"
    - "tail"
    - "cp"
    - "mv"
    - "wget"
    - "curl"
    - "nc"
    - "ncat"
