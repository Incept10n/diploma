# Default values for k8s-security-controller

controller:
  image:
    repository: incept1on999/k8s-security-controller
    tag: latest
    pullPolicy: Always
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
# Falco integration
falco:
  enabled: true
  resources:
    limits:
      cpu: 1000m
      memory: 1024Mi
    requests:
      cpu: 100m
      memory: 512Mi
  securityContext:
    privileged: true
  customRules: {}
  falco:
    json_output: true
    json_include_output_property: true
    json_include_output_fields_property: true
    http_output:
      enabled: true
      url: "http://k8s-security-controller-falcosidekick.si.svc.cluster.local:2801"
  falcosidekick:
    enabled: true
    config:
      webhook:
        address: "http://k8s-security-controller-agent.si.svc.cluster.local:2801/falco/event"
        method: "POST"

# Sysdig integration
sysdig:
  enabled: false
  resources:
    limits:
      cpu: 500m
      memory: 1024Mi
    requests:
      cpu: 200m
      memory: 512Mi
  secure:
    enabled: false
  sysdig:
    accessKey: ""
  securityContext:
    privileged: true
  nodeAnalyzer:
    deploy: false
  admissionController:
    enabled: false
  clusterShield:
    enabled: false
  daemonset:
    enabled: true
  ebpf:
    enabled: true
  k8s:
    enabled: true
  logLevel: info
  serviceAccount:
    create: true

# Kube-bench integration
kube-bench:
  enabled: false
  cronjob:
    schedule: "* * * * *"
  provider: generic
  target: master
  benchmarkVersion: "cis-1.6"
  jsonLogging: true
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

    killContainer: false

cron:
  enabled: false
  monitoringInterval: 10s
  monitoredPaths:
    - "/etc/crontab"
    - "/etc/cron.d/*"
    - "/var/spool/cron/crontabs/*"
  suspiciousPatterns:
    - "* * * * *"
    - "*/1 *"
    - "sh -c"
    - "bash -c"
    - "wget"
    - "curl"
    - "nc "
    - "ncat"
    - "/tmp/"
    - "/dev/shm/"
  allowedCommands:
    - "/usr/bin/apt"
    - "/usr/bin/yum"
    - "/usr/bin/systemctl"
    - "/usr/bin/logrotate"

fileMonitoring:
  enabled: false
  monitoringInterval: 10s
  forbiddenExtensions:
    - ".pl"
    - ".sh"
    - ".php"
    - ".jsp"
    - ".asp"
    - ".exe"
    - ".dll"
    - ".so"
    - ".tmp"
    - ".bak"
  protectedPaths:
    - "/app"
    - "/var/www"
    - "/home"
    - "/opt"
  allowedWritePaths:
    - "/app/uploads/"
    - "/var/www/html/uploads/"
    - "/tmp/"
    - "/app/cache/"
  maxFileSize: 10485760  # 10MB

falcoWebhook:
  enabled: true
  listenAddr: ":2801"
  actions:
    deletePod: true
    terminateProcess: false
