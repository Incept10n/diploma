cron:
  enabled: false
  monitoringInterval: 30s
  monitoredPaths:
    - "/etc/crontab"
    - "/etc/cron.d/"
    - "/var/spool/cron/crontabs/"
    - "/etc/cron.hourly/"
    - "/etc/cron.daily/"
    - "/etc/cron.weekly/"
    - "/etc/cron.monthly/"
  suspiciousPatterns:
    - "* * * * * *"
    - "*/1 *"
    - "sh -c"
    - "bash -c"
    - "wget"
    - "curl"
    - "nc "
    - "ncat"
    - "/tmp/"
    - "/dev/shm/"
  allowedCommands:
    - "/usr/bin/apt"
    - "/usr/bin/yum"
    - "/usr/bin/systemctl"
    - "/usr/bin/logrotate"

fileMonitoring:
  enabled: true
  monitoringInterval: 10s
  suspiciousExtensions:
    - ".sh"
    - ".py"
    - ".pl"
    - ".php"
    - ".jsp"
    - ".asp"
    - ".exe"
    - ".dll"
    - ".so"
    - ".tmp"
    - ".bak"
  protectedPaths:
    - "/app/"
    - "/var/www/"
    - "/home/"
    - "/opt/"
  workDirMonitoring:
    - "/app/"
    - "/var/www/html/"
    - "/workspace/"
  maxFileSize: 10485760  # 10MB

secrets:
  enabled: true
  protectedPaths:
    - "/var/run/secrets/kubernetes.io/serviceaccount/"
    - "/etc/secret-volume/"
    - "/app/secrets.txt"
    - "/config/"
  suspiciousAccessPatterns:
    - "cat"
    - "grep"
    - "less"
    - "more"
    - "head"
    - "tail"
    - "cp"
    - "mv"
    - "wget"
    - "curl"
    - "nc"
    - "ncat"

logging:
  level: "info"
