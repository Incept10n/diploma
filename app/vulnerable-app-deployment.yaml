apiVersion: apps/v1
kind: Deployment
metadata:
  name: vulnerable-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vulnerable-app
  template:
    metadata:
      labels:
        app: vulnerable-app
    spec:
      containers:
      - name: vulnerable-app
        image: vulnerable-app:latest
        ports:
        - containerPort: 8000
        # Умышленно небезопасная конфигурация для тестирования
        securityContext:
          privileged: true
          runAsUser: 0
        volumeMounts:
        - name: host-proc
          mountPath: /host/proc
          readOnly: true
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: host-proc
        hostPath:
          path: /proc
---
apiVersion: v1
kind: Service
metadata:
  name: vulnerable-app-service
spec:
  selector:
    app: vulnerable-app
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: NodePort
